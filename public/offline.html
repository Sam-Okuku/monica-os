<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monica OS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1E1B4B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 320px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #7C3AED;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: white;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: #7C3AED;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>You are offline</h1>
    <p>Monica OS works fully offline once installed. Open the app from your home screen.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
