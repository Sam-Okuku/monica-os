<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monica OS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafaf9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #444441;
    }
    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 360px;
    }
    .dot {
      width: 48px;
      height: 48px;
      background: #EEEDFE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 22px;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #2C2C2A;
    }
    p {
      font-size: 14px;
      color: #888780;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: #534AB7;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot">○</div>
    <h1>You are offline</h1>
    <p>Monica OS works fully offline once installed. Open the app from your home screen to continue working without internet.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
